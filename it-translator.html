<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IT Translator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0e17;
    color: #e2eaf6;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 640px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
  }
  .logo-title {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(90deg, #00d4ff, #0066ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-size: 10px;
    color: #5a7090;
    letter-spacing: 2px;
    font-family: monospace;
  }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #111827;
    border: 1px solid #1e2d45;
    padding: 6px 12px;
    border-radius: 20px;
    font-family: monospace;
    font-size: 11px;
    color: #5a7090;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #5a7090;
    transition: all 0.3s;
  }
  .dot.active  { background: #00ff88; box-shadow: 0 0 8px #00ff88; animation: blink 1.5s infinite; }
  .dot.working { background: #ffb300; box-shadow: 0 0 8px #ffb300; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .info {
    background: rgba(0,102,255,0.08);
    border: 1px solid rgba(0,102,255,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #5a7090;
    line-height: 1.7;
  }

  .btn-main {
    width: 100%;
    padding: 20px;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #fff;
    transition: all 0.2s;
  }
  .btn-main.idle {
    background: linear-gradient(135deg, #0066ff, #00d4ff);
    box-shadow: 0 4px 24px rgba(0,102,255,0.4);
  }
  .btn-main.recording {
    background: linear-gradient(135deg, #c0001a, #ff4466);
    box-shadow: 0 4px 24px rgba(255,68,102,0.5);
    animation: recPulse 2s infinite;
  }
  @keyframes recPulse {
    0%,100%{box-shadow:0 4px 24px rgba(255,68,102,0.4)}
    50%{box-shadow:0 4px 40px rgba(255,68,102,0.7)}
  }

  .error {
    background: rgba(255,68,102,0.1);
    border: 1px solid rgba(255,68,102,0.3);
    color: #ff4466;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    display: none;
  }

  .panel-it {
    background: #0d1f0f;
    border: 2px solid #00ff88;
    border-radius: 16px;
    padding: 24px 20px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .panel-it-label {
    font-family: monospace;
    font-size: 10px;
    color: #00ff88;
    letter-spacing: 3px;
    opacity: 0.7;
  }
  .panel-it-text {
    font-size: 28px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.5;
    flex: 1;
  }
  .panel-it-text.muted {
    color: #5a7090;
    font-style: italic;
    font-size: 16px;
    font-weight: 400;
  }
  .panel-it-text.working {
    color: #ffb300;
    font-style: italic;
    font-size: 18px;
    font-weight: 400;
  }

  .panel {
    background: #111827;
    border: 1px solid #1e2d45;
    border-radius: 12px;
    overflow: hidden;
  }
  .transcript-head {
    background: #1a2235;
    padding: 10px 14px;
    border-bottom: 1px solid #1e2d45;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .transcript-title {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .count {
    font-family: monospace; font-size: 10px;
    background: rgba(0,212,255,0.1); color: #00d4ff;
    border: 1px solid rgba(0,212,255,0.2);
    padding: 2px 7px; border-radius: 10px;
  }
  .btn-sm {
    padding: 5px 10px; border-radius: 7px;
    font-family: monospace; font-size: 10px; font-weight: 600;
    cursor: pointer; border: none;
  }
  .btn-dl { background: rgba(0,255,136,0.1); color: #00ff88; border: 1px solid rgba(0,255,136,0.2); }
  .btn-cl { background: rgba(255,68,102,0.1); color: #ff4466; border: 1px solid rgba(255,68,102,0.2); }

  .transcript-list {
    max-height: 260px;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .transcript-list::-webkit-scrollbar { width: 3px; }
  .transcript-list::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 2px; }

  .empty-msg {
    text-align: center;
    padding: 24px 0;
    color: #5a7090;
    font-size: 13px;
    font-style: italic;
    line-height: 1.8;
  }

  .entry {
    background: #1a2235;
    border: 1px solid #1e2d45;
    border-radius: 10px;
    overflow: hidden;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .entry-time {
    padding: 5px 10px;
    font-family: monospace;
    font-size: 9px;
    color: #5a7090;
    border-bottom: 1px solid #1e2d45;
  }
  .entry-en {
    padding: 6px 10px;
    font-size: 12px;
    color: #5a7090;
    border-bottom: 1px dashed #1e2d45;
    line-height: 1.5;
  }
  .entry-it {
    padding: 7px 10px;
    font-size: 14px;
    color: #00ff88;
    line-height: 1.5;
    font-weight: 500;
  }
  .entry-sublabel {
    font-family: monospace;
    font-size: 9px;
    opacity: 0.5;
    display: block;
    margin-bottom: 2px;
    letter-spacing: 1px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #00ff88;
    color: #0a0e17;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    display: none;
    z-index: 99;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,255,136,0.4);
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo-title">IT Translator</div>
    <div class="logo-sub">EN → IT · LIVE MEETING</div>
  </div>
  <div class="status-badge">
    <div class="dot" id="dot"></div>
    <span id="statusTxt">PRONTO</span>
  </div>
</div>

<div class="info">
  💡 Premi <b>Avvia</b> e avvicina il telefono al collega.<br>
  Premi <b>Stop</b> per salvare automaticamente la trascrizione.
</div>

<button class="btn-main idle" id="btnMain" onclick="toggle()">
  <span id="btnIcon">🎤</span>
  <span id="btnTxt">Avvia Ascolto</span>
</button>

<div class="error" id="errBox"></div>

<div class="panel-it">
  <div class="panel-it-label">🇮🇹 TRADUZIONE ITALIANA</div>
  <div class="panel-it-text muted" id="liveIt">In attesa della traduzione...</div>
</div>

<div class="panel">
  <div class="transcript-head">
    <div class="transcript-title">
      📋 Storico
      <span class="count" id="countBadge">0</span>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn-sm btn-dl" onclick="downloadNow()">⬇ Salva</button>
      <button class="btn-sm btn-cl" onclick="clearAll()">🗑 Pulisci</button>
    </div>
  </div>
  <div class="transcript-list" id="list">
    <div class="empty-msg">Nessuna trascrizione ancora.<br>Avvia l'ascolto per iniziare.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let rec = null;
  let recording = false;
  let pending = '';
  let timer = null;
  let busy = false;
  let transcript = [];

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  function setStatus(state, txt) {
    document.getElementById('dot').className = 'dot ' + state;
    document.getElementById('statusTxt').textContent = txt;
  }

  function showError(msg) {
    const el = document.getElementById('errBox');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 7000);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  }

  function setItPanel(text, mode) {
    const el = document.getElementById('liveIt');
    el.textContent = text;
    el.className = 'panel-it-text ' + (mode || '');
  }

  function toggle() {
    recording ? stop() : start();
  }

  function start() {
    if (!SpeechRecognition) {
      showError('Browser non supportato. Apri questo file con Chrome.');
      return;
    }
    rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.continuous = true;
    rec.interimResults = true;

    rec.onstart = () => {
      recording = true;
      setStatus('active', 'ASCOLTO');
      document.getElementById('btnMain').className = 'btn-main recording';
      document.getElementById('btnIcon').textContent = '⏹';
      document.getElementById('btnTxt').textContent = 'Stop e Salva';
    };

    rec.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      if (interim) setItPanel('⏳ ' + interim, 'working');
      if (final.trim()) {
        pending += final;
        clearTimeout(timer);
        timer = setTimeout(() => {
          translate(pending.trim());
          pending = '';
        }, 1000);
      }
    };

    rec.onerror = (e) => {
      if (e.error === 'no-speech') return;
      if (e.error === 'not-allowed') {
        showError('⚠️ Microfono bloccato. Tocca 🔒 nella barra Chrome → Microfono → Consenti → ricarica.');
      } else {
        showError('Errore: ' + e.error);
      }
      stop(false);
    };

    rec.onend = () => { if (recording) rec.start(); };
    rec.start();
  }

  function stop(autoSave = true) {
    recording = false;
    if (rec) { rec.stop(); rec = null; }
    setStatus('', 'PRONTO');
    document.getElementById('btnMain').className = 'btn-main idle';
    document.getElementById('btnIcon').textContent = '🎤';
    document.getElementById('btnTxt').textContent = 'Avvia Ascolto';

    if (pending.trim()) {
      translate(pending.trim(), autoSave);
      pending = '';
    } else if (autoSave && transcript.length > 0) {
      downloadNow(true);
    }
  }

  async function translate(text, saveAfter = false) {
    if (!text || busy) return;
    busy = true;
    setStatus('working', 'TRADUCO');
    setItPanel('⏳ Traduzione in corso...', 'working');

    try {
      const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=it&dt=t&q=' + encodeURIComponent(text);
      const res = await fetch(url);
      const data = await res.json();

      let it = '';
      if (data && data[0]) {
        data[0].forEach(seg => { if (seg && seg[0]) it += seg[0]; });
      }
      it = it.trim() || '—';

      setItPanel(it, '');
      addEntry(text, it);
      if (saveAfter) setTimeout(() => downloadNow(true), 300);

    } catch (err) {
      setItPanel('⚠️ Errore di rete. Controlla la connessione.', 'working');
      showError('Errore traduzione: ' + err.message);
    }

    busy = false;
    if (recording) setStatus('active', 'ASCOLTO');
  }

  function addEntry(en, it) {
    const now = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    transcript.push({ time: now, en, it });
    document.getElementById('countBadge').textContent = transcript.length;

    const list = document.getElementById('list');
    const empty = list.querySelector('.empty-msg');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `
      <div class="entry-time">${now}</div>
      <div class="entry-en"><span class="entry-sublabel">EN</span>${en}</div>
      <div class="entry-it"><span class="entry-sublabel">IT</span>${it}</div>
    `;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
  }

  function downloadNow(auto = false) {
    if (transcript.length === 0) { if (!auto) showError('Nessuna trascrizione da salvare.'); return; }

    const date = new Date().toLocaleDateString('it-IT').replace(/\//g, '-');
    const time = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }).replace(':', 'h');
    let txt = `TRASCRIZIONE RIUNIONE IT\nData: ${date}  Ora: ${time}\n${'='.repeat(50)}\n\n`;
    transcript.forEach(e => {
      txt += `[${e.time}]\nEN: ${e.en}\nIT: ${e.it}\n\n`;
    });

    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
    a.download = `riunione-IT-${date}-${time}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast('✅ Trascrizione salvata!');
  }

  function clearAll() {
    if (!transcript.length) return;
    if (confirm('Cancellare tutta la trascrizione?')) {
      transcript = [];
      document.getElementById('countBadge').textContent = '0';
      document.getElementById('list').innerHTML = '<div class="empty-msg">Nessuna trascrizione ancora.<br>Avvia l\'ascolto per iniziare.</div>';
      setItPanel('In attesa della traduzione...', 'muted');
    }
  }
</script>
</body>
</html>
